<!DOCTYPE html>
<html lang="en">
<head>

    <title>Tailwind Landing Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<body>

    <!-- Final Tailwind CSS Project -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <!-- nav header section -->
        <div class="max-w-5xl mx-auto p-4 py-4 flex justify-between items-center">
            <!-- logo -->
            <h1 class="text-indigo-500 text-2xl md:text-3xl font-bold">CompanyLogo</h1>

            <!-- navigation -->
            <div class="hidden md:flex md:mx-6 space-x-8 text-gray-600 font-medium">
                <a href="#" class="hover:text-purple-600 curso-pointer">Features</a>
                <a href="#" class="hover:text-purple-600 curso-pointer">Testimonials</a>
                <a href="#" class="hover:text-purple-600 curso-pointer">Pricing</a>
                <a href="#" class="hover:text-purple-600 curso-pointer">Contact</a>
            </div>

            <button class="px-8 md:hidden text-indigo-500 text-3xl font-bold">☰</button>
        </div>

    </nav>

    <!-- hero sectiion -->
    <section class=" bg-linear-to-r from-indigo-500 to-violet-500 text-white py-24">
        <div class="max-w-5xl mx-auto text-center p-6">
           <h1 class="text-4xl md:text-5xl font-bold mb-6">Transform Your Business</h1>
           <p class="text-lg text-gray-200 mb-8">Elevate your online presence with our cutting-edge solutions</p>
           <button class="bg-white text-purple-600 px-6 py-3 rounded hover:bg-gray-100 cursor-pointer transition">Get Started</button> 
        </div>

    </section>

</html>
